name: Release On Tag

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Version tag to validate against, for example 1.5.7 or v1.5.7'
        required: true
        type: string
      publish:
        description: 'Publish to PowerShell Gallery and create or update the GitHub release'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Test, Publish, and Release
    runs-on: windows-latest
    env:
      INVOKEBUILD_VERSION: '5.14.23'
      PESTER_VERSION: '5.7.1'
      PSSCRIPTANALYZER_VERSION: '1.23.0'
      MODULEBUILDER_VERSION: '3.1.8'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release mode
        id: release
        shell: pwsh
        run: |
          $eventName = '${{ github.event_name }}'

          if ($eventName -eq 'push') {
              $tag = '${{ github.ref_name }}'
              $shouldPublish = $true
          }
          else {
              $tag = '${{ inputs.release_tag }}'
              $shouldPublish = '${{ inputs.publish }}' -eq 'true'
          }

          if ($tag -notmatch '^(v)?\d+\.\d+\.\d+$') {
              throw "Release tag '$tag' is invalid. Expected format: <major>.<minor>.<patch> or v<major>.<minor>.<patch>."
          }

          $version = $tag -replace '^v', ''

          "release_tag=$tag" | Add-Content $env:GITHUB_OUTPUT
          "release_version=$version" | Add-Content $env:GITHUB_OUTPUT
          "should_publish=$($shouldPublish.ToString().ToLowerInvariant())" | Add-Content $env:GITHUB_OUTPUT

      - name: Checkout requested tag for manual run
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $tag = '${{ steps.release.outputs.release_tag }}'
          $tagRef = "refs/tags/$tag"

          git fetch --force --tags
          git rev-parse --verify $tagRef
          if ($LASTEXITCODE -ne 0) {
              throw "Tag '$tag' was not found. Push the tag before running this workflow manually."
          }

          git switch --detach $tagRef

      - name: Show PowerShell version
        shell: pwsh
        run: $PSVersionTable

      - name: Cache PowerShell modules
        uses: actions/cache@v4
        with:
          path: ~\Documents\PowerShell\Modules
          key: psmodules-${{ runner.os }}-${{ env.INVOKEBUILD_VERSION }}-${{ env.PESTER_VERSION }}-${{ env.PSSCRIPTANALYZER_VERSION }}-${{ env.MODULEBUILDER_VERSION }}

      - name: Install dependencies
        shell: pwsh
        run: |
          $requiredModules = @(
              @{ Name = 'InvokeBuild'; Version = '${{ env.INVOKEBUILD_VERSION }}' }
              @{ Name = 'Pester'; Version = '${{ env.PESTER_VERSION }}' }
              @{ Name = 'PSScriptAnalyzer'; Version = '${{ env.PSSCRIPTANALYZER_VERSION }}' }
              @{ Name = 'ModuleBuilder'; Version = '${{ env.MODULEBUILDER_VERSION }}' }
          )

          foreach ($module in $requiredModules) {
              $available = Get-Module -ListAvailable -Name $module.Name |
                  Where-Object { $_.Version -ge [version]$module.Version } |
                  Sort-Object Version -Descending |
                  Select-Object -First 1

              if (-not $available) {
                  Install-Module $module.Name -MinimumVersion $module.Version -Force -SkipPublisherCheck -Scope CurrentUser
              }
          }

          Import-Module InvokeBuild
          Import-Module Pester
          Import-Module PSScriptAnalyzer
          Import-Module ModuleBuilder

      - name: Run validation
        shell: pwsh
        run: Invoke-Build Validate -File ./TLSleuth.build.ps1 -ReleaseVersion '${{ steps.release.outputs.release_version }}'

      - name: Validate module version matches tag
        shell: pwsh
        run: |
          $tag = '${{ steps.release.outputs.release_tag }}'
          $tagVersion = '${{ steps.release.outputs.release_version }}'
          $manifest = Import-PowerShellDataFile ./source/TLSleuth.psd1

          if ($manifest.ModuleVersion -ne $tagVersion) {
              throw "ModuleVersion '$($manifest.ModuleVersion)' does not match tag '$tag'."
          }

      - name: Extract release notes from changelog
        shell: pwsh
        run: Invoke-Build WriteReleaseNotes -File ./TLSleuth.build.ps1 -ReleaseVersion '${{ steps.release.outputs.release_version }}' -ReleaseNotesPath ./release-notes.md

      - name: Publish to PowerShell Gallery
        if: steps.release.outputs.should_publish == 'true'
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: Invoke-Build PublishBuilt -File ./TLSleuth.build.ps1

      - name: Dry-run publish script
        if: steps.release.outputs.should_publish != 'true'
        shell: pwsh
        env:
          PSGALLERY_API_KEY: dry-run
        run: Invoke-Build PublishBuiltWhatIf -File ./TLSleuth.build.ps1

      - name: Create or update GitHub release
        if: steps.release.outputs.should_publish == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.release.outputs.release_tag }}'
          $repo = '${{ github.repository }}'
          $notesFile = Join-Path $PWD 'release-notes.md'

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
              gh release edit $tag --repo $repo --title $tag --notes-file $notesFile --latest
          }
          else {
              gh release create $tag --repo $repo --verify-tag --title $tag --notes-file $notesFile --latest
          }
